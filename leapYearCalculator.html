<!doctype html>
<html lang="en">

<head>
	<!-- Required meta tags -->
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

	<!-- Bootstrap CSS v5.2.1 -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
	<title>Leap Year Calculator</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			margin: 40px;
		}

		.calculator {
			max-width: 350px;
			padding: 20px;
			border: 1px solid #ccc;
			border-radius: 8px;
		}

		input {
			width: 100%;
			padding: 8px;
			margin: 10px 0;
		}

		button {
			padding: 8px 12px;
			cursor: pointer;
		}

		.result {
			margin-top: 15px;
			font-weight: bold;
		}
	</style>

</head>

<body>
	<header>
		<!-- place navbar here -->
	</header>
	<main>
		<div class="calculator">
			<h2>Leap Year Calculator</h2>
			<label for="year">Enter Year:</label>
			<input type="number" id="year" placeholder="e.g. 2024">
			<button onclick="checkLeapYear()">Check</button>
			<div class="result" id="result"></div>
		</div>

	</main> 
	<footer>
		<!-- place footer here -->
	</footer>
	<!-- Bootstrap JavaScript Libraries -->
	<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
		integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
		crossorigin="anonymous"></script>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
		integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
		crossorigin="anonymous"></script>
	<script>
		function isLeapYear(year) {
			if (year % 400 === 0) {
				return `${year} is a leap year.`;
			} else if (year % 100 === 0) {
				return `${year} is not a leap year.`;
			} else if (year % 4 === 0) {
				return `${year} is a leap year.`;
			} else {
				return `${year} is not a leap year.`;
			}
		}
		function checkLeapYear() {
			const yearInput = document.getElementById("year").value;
			if (yearInput === "") {
				document.getElementById("result").textContent = "Please enter a year.";
				return;
			}
			const result = isLeapYear(Number(yearInput));
			document.getElementById("result").textContent = result;
		}		
	</script>
</body>

</html>
